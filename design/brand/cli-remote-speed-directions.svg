<svg width="2200" height="1600" viewBox="0 0 2200 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="speedSlip" x1="202" y1="334" x2="542" y2="698" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B2A2F"/>
      <stop offset="1" stop-color="#121114"/>
    </linearGradient>
    <linearGradient id="speedSlipArrow" x1="290" y1="528" x2="552" y2="710" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3B95E"/>
      <stop offset="1" stop-color="#CD6A33"/>
    </linearGradient>
    <linearGradient id="speedGlide" x1="874" y1="334" x2="1266" y2="698" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0D8BF"/>
      <stop offset="1" stop-color="#E2B487"/>
    </linearGradient>
    <linearGradient id="speedComet" x1="1550" y1="334" x2="1944" y2="698" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D7743A"/>
      <stop offset="1" stop-color="#7F3720"/>
    </linearGradient>
    <filter id="speedCardShadow" x="104" y="248" width="1994" height="1048" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#7B6B59" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="2200" height="1600" fill="#F4EEE5"/>
  <text x="140" y="140" fill="#9E4D24" font-size="34" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="700" letter-spacing="6">CLI REMOTE SPEED DIRECTIONS</text>
  <text x="140" y="238" fill="#2E2B27" font-size="88" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="800">Smoother, faster, more immediate</text>
  <text x="140" y="306" fill="#5E564F" font-size="34" font-family="Avenir Next, Helvetica, Arial, sans-serif">
    <tspan x="140" dy="0">This round drops the literal remote-session framing and biases toward speed perception:</tspan>
    <tspan x="140" dy="48">flow, acceleration, low latency, and a "super fast" first impression.</tspan>
  </text>

  <g filter="url(#speedCardShadow)">
    <rect x="120" y="380" width="620" height="820" rx="42" fill="#FBF7F1"/>
    <rect x="790" y="380" width="620" height="820" rx="42" fill="#FBF7F1"/>
    <rect x="1460" y="380" width="620" height="820" rx="42" fill="#FBF7F1"/>
  </g>

  <g>
    <rect x="200" y="456" width="460" height="460" rx="130" fill="url(#speedSlip)"/>
    <rect x="264" y="564" width="156" height="30" rx="15" fill="#4F463D"/>
    <rect x="264" y="618" width="122" height="24" rx="12" fill="#5F554A"/>
    <rect x="264" y="664" width="92" height="18" rx="9" fill="#6E6256"/>
    <path d="M354 540L560 686L354 832C338 842 320 830 320 810V562C320 542 338 530 354 540Z" fill="url(#speedSlipArrow)"/>
    <text x="380" y="718" fill="#FFF7EE" font-size="108" font-family="Menlo, Monaco, Consolas, monospace" font-weight="700">&gt;_</text>
    <text x="200" y="1012" fill="#2E2B27" font-size="44" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="800">1. Slipstream</text>
    <text x="200" y="1074" fill="#6A615A" font-size="29" font-family="Avenir Next, Helvetica, Arial, sans-serif">
      <tspan x="200" dy="0">Most obvious speed read.</tspan>
      <tspan x="200" dy="40">Best launcher candidate from this round.</tspan>
      <tspan x="200" dy="40">Feels punchy and low-latency.</tspan>
    </text>
  </g>

  <g>
    <rect x="870" y="456" width="460" height="460" rx="130" fill="url(#speedGlide)"/>
    <path d="M950 760C1022 752 1094 724 1170 658C1220 614 1266 580 1308 568" stroke="#3B322D" stroke-width="22" stroke-linecap="round"/>
    <path d="M952 816C1034 806 1118 770 1198 696C1246 650 1288 620 1320 610" stroke="#CD6A33" stroke-width="22" stroke-linecap="round"/>
    <path d="M966 870C1058 858 1142 822 1228 744" stroke="#F6E9D9" stroke-width="20" stroke-linecap="round"/>
    <circle cx="1314" cy="562" r="20" fill="#2E2B27"/>
    <circle cx="1322" cy="586" r="14" fill="#CD6A33"/>
    <text x="1010" y="684" fill="#2E2B27" font-size="94" font-family="Menlo, Monaco, Consolas, monospace" font-weight="700">&gt;_</text>
    <text x="870" y="1012" fill="#2E2B27" font-size="44" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="800">2. Glide Rail</text>
    <text x="870" y="1074" fill="#6A615A" font-size="29" font-family="Avenir Next, Helvetica, Arial, sans-serif">
      <tspan x="870" dy="0">Smoothest and most controlled.</tspan>
      <tspan x="870" dy="40">Signals effortless speed rather than brute force.</tspan>
      <tspan x="870" dy="40">Softer launcher read than Slipstream.</tspan>
    </text>
  </g>

  <g>
    <rect x="1540" y="456" width="460" height="460" rx="130" fill="url(#speedComet)"/>
    <path d="M1616 780C1690 774 1762 756 1828 714C1872 686 1914 648 1954 598" stroke="#FFF2E2" stroke-width="28" stroke-linecap="round"/>
    <path d="M1634 836C1714 832 1788 812 1856 768" stroke="#F6D59A" stroke-width="18" stroke-linecap="round" opacity="0.88"/>
    <path d="M1648 882C1712 880 1770 868 1828 838" stroke="#F9E8CE" stroke-width="12" stroke-linecap="round" opacity="0.66"/>
    <circle cx="1964" cy="586" r="28" fill="#FFF4E6"/>
    <circle cx="1964" cy="586" r="14" fill="#F3B95E"/>
    <text x="1692" y="734" fill="#FFF7EE" font-size="98" font-family="Menlo, Monaco, Consolas, monospace" font-weight="700">&gt;_</text>
    <text x="1540" y="1012" fill="#2E2B27" font-size="44" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="800">3. Comet Prompt</text>
    <text x="1540" y="1074" fill="#6A615A" font-size="29" font-family="Avenir Next, Helvetica, Arial, sans-serif">
      <tspan x="1540" dy="0">Most emotional speed signal.</tspan>
      <tspan x="1540" dy="40">Curved motion keeps it feeling smooth.</tspan>
      <tspan x="1540" dy="40">More stylized, less purely utilitarian.</tspan>
    </text>
  </g>

  <rect x="120" y="1288" width="1960" height="178" rx="32" fill="#FFF9F2"/>
  <text x="168" y="1360" fill="#2E2B27" font-size="34" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="800">Recommendation</text>
  <text x="168" y="1412" fill="#5E564F" font-size="31" font-family="Avenir Next, Helvetica, Arial, sans-serif">
    <tspan x="168" dy="0">If you want "super fast" to land immediately, start with Slipstream.</tspan>
    <tspan x="168" dy="44">If you want "smooth and fast" rather than "aggressive and fast," Glide Rail is the cleanest interpretation.</tspan>
  </text>
</svg>
