<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fill1" x1="0" x2="1" y1="0" y2="0.7">
      <stop stop-color="#7de" offset="0%" />
      <stop stop-color="#ee9" offset="100%" />
    </linearGradient>
    <clipPath id="rounded-square">
      <rect x="4" y="4" width="92" height="92" rx="21" ry="21" />
