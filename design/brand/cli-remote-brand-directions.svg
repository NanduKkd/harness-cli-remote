<svg width="2200" height="1600" viewBox="0 0 2200 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boardSignal" x1="212" y1="326" x2="542" y2="686" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DF8247"/>
      <stop offset="1" stop-color="#9E4D24"/>
    </linearGradient>
    <linearGradient id="boardOrbit" x1="938" y1="332" x2="1262" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A3530"/>
      <stop offset="1" stop-color="#181614"/>
    </linearGradient>
    <linearGradient id="boardBeacon" x1="1662" y1="334" x2="1988" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2D8BE"/>
      <stop offset="1" stop-color="#D97A41"/>
    </linearGradient>
    <filter id="boardCardShadow" x="104" y="248" width="1994" height="1048" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#7B6B59" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="2200" height="1600" fill="#F4EEE5"/>
  <text x="140" y="140" fill="#9E4D24" font-size="34" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="700" letter-spacing="6">CLI REMOTE BRAND DIRECTIONS</text>
  <text x="140" y="238" fill="#2E2B27" font-size="88" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="800">Logo and launcher icon suggestions</text>
  <text x="140" y="306" fill="#5E564F" font-size="34" font-family="Avenir Next, Helvetica, Arial, sans-serif">
    <tspan x="140" dy="0">All three directions stay clear of Gemini trademark mimicry and instead focus on your actual product shape:</tspan>
    <tspan x="140" dy="48">remote terminal sessions, paired devices, live output, and shared artifacts.</tspan>
  </text>

  <g filter="url(#boardCardShadow)">
    <rect x="120" y="380" width="620" height="820" rx="42" fill="#FBF7F1"/>
    <rect x="790" y="380" width="620" height="820" rx="42" fill="#FBF7F1"/>
    <rect x="1460" y="380" width="620" height="820" rx="42" fill="#FBF7F1"/>
  </g>

  <g>
    <rect x="200" y="456" width="460" height="460" rx="130" fill="url(#boardSignal)"/>
    <rect x="280" y="566" width="300" height="222" rx="40" fill="#F8F1E8"/>
    <circle cx="314" cy="602" r="9" fill="#D7773E"/>
    <circle cx="344" cy="602" r="9" fill="#EDC269"/>
    <path d="M292 632H568" stroke="#DED4C8" stroke-width="4"/>
    <text x="324" y="704" fill="#2E2B27" font-size="122" font-family="Menlo, Monaco, Consolas, monospace" font-weight="700">&gt;_</text>
    <path d="M474 510C520 518 562 558 568 604" stroke="#F7E6D2" stroke-width="22" stroke-linecap="round"/>
    <path d="M508 482C576 492 634 548 646 616" stroke="#F1BC6A" stroke-width="22" stroke-linecap="round" opacity="0.82"/>
    <text x="200" y="1012" fill="#2E2B27" font-size="44" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="800">1. Signal Tile</text>
    <text x="200" y="1074" fill="#6A615A" font-size="29" font-family="Avenir Next, Helvetica, Arial, sans-serif">
      <tspan x="200" dy="0">The safest launcher choice.</tspan>
      <tspan x="200" dy="40">Terminal plus signal read instantly.</tspan>
      <tspan x="200" dy="40">Recommended if you want clarity first.</tspan>
    </text>
  </g>

  <g>
    <rect x="870" y="456" width="460" height="460" rx="130" fill="url(#boardOrbit)"/>
    <circle cx="1100" cy="686" r="132" stroke="#E8D7C2" stroke-width="22"/>
    <path d="M968 686C968 586 1050 504 1150 504" stroke="#CD6A33" stroke-width="20" stroke-linecap="round"/>
    <path d="M1232 686C1232 786 1150 868 1050 868" stroke="#F1BE6A" stroke-width="20" stroke-linecap="round"/>
    <circle cx="1168" cy="526" r="16" fill="#F1BE6A"/>
    <circle cx="1036" cy="846" r="16" fill="#CD6A33"/>
    <circle cx="1100" cy="686" r="84" fill="#F8F1E8"/>
    <text x="1026" y="724" fill="#2E2B27" font-size="104" font-family="Menlo, Monaco, Consolas, monospace" font-weight="700">&gt;_</text>
    <text x="870" y="1012" fill="#2E2B27" font-size="44" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="800">2. Orbit Prompt</text>
    <text x="870" y="1074" fill="#6A615A" font-size="29" font-family="Avenir Next, Helvetica, Arial, sans-serif">
      <tspan x="870" dy="0">More brandable and slightly more premium.</tspan>
      <tspan x="870" dy="40">Best if you expect a fuller identity later.</tspan>
      <tspan x="870" dy="40">Less blunt than Concept 1 at tiny sizes.</tspan>
    </text>
  </g>

  <g>
    <rect x="1540" y="456" width="460" height="460" rx="130" fill="url(#boardBeacon)"/>
    <path d="M1668 790L1770 584L1874 790" stroke="#2E2B27" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="1770" cy="584" r="46" fill="#2E2B27"/>
    <circle cx="1770" cy="584" r="18" fill="#F7F1E8"/>
    <circle cx="1686" cy="790" r="50" fill="#2E2B27"/>
    <circle cx="1854" cy="790" r="50" fill="#9E4D24"/>
    <circle cx="1686" cy="790" r="20" fill="#F7F1E8"/>
    <circle cx="1854" cy="790" r="20" fill="#F7F1E8"/>
    <rect x="1718" y="672" width="104" height="76" rx="22" fill="#F8F1E8"/>
    <text x="1736" y="720" fill="#2E2B27" font-size="44" font-family="Menlo, Monaco, Consolas, monospace" font-weight="700">&gt;_</text>
    <text x="1540" y="1012" fill="#2E2B27" font-size="44" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="800">3. Link Beacon</text>
    <text x="1540" y="1074" fill="#6A615A" font-size="29" font-family="Avenir Next, Helvetica, Arial, sans-serif">
      <tspan x="1540" dy="0">The most original and technical direction.</tspan>
      <tspan x="1540" dy="40">Feels like a live bridge between phone and host.</tspan>
      <tspan x="1540" dy="40">Needs more time if you want instant recognition.</tspan>
    </text>
  </g>

  <rect x="120" y="1288" width="1960" height="178" rx="32" fill="#FFF9F2"/>
  <text x="168" y="1360" fill="#2E2B27" font-size="34" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-weight="800">Recommendation</text>
  <text x="168" y="1412" fill="#5E564F" font-size="31" font-family="Avenir Next, Helvetica, Arial, sans-serif">
    <tspan x="168" dy="0">Start with Concept 1 if your immediate goal is shipping the Android launcher icon.</tspan>
    <tspan x="168" dy="44">Choose Concept 2 if you want the cleanest long-term logo system. Concept 3 is the strongest "remote bridge" story.</tspan>
  </text>
</svg>
