<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="prompt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <g transform="translate(130, 140) scale(1.1) skewX(-15)" filter="url(#glow)">
    <path d="M-40 60 L20 60" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
    <path d="M-20 100 L40 100" stroke="#818cf8" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
    <path d="M-60 140 L0 140" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
    
    <path d="M50 40 L130 100 L50 160" fill="none" stroke="url(#prompt)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="160" y="124" width="36" height="36" rx="8" fill="#818cf8" />
  </g>
</svg>